<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolNet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #0e1a22;
    color: #e6edf3;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
}

.nav-links button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 16px;
    margin-left: 10px;
    border-radius: 6px;
    color: #cbd5df;
    cursor: pointer;
    transition: 0.2s;
}

.nav-links button:hover {
    border-color: rgba(255,255,255,0.3);
    color: white;
}

/* MAIN */
.main {
    min-height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.card {
    width: 100%;
    max-width: 620px;
    padding: 48px;
    border-radius: 12px;
    background: #111f29;
    border: 1px solid rgba(255,255,255,0.05);
}

h1 {
    font-size: 34px;
    font-weight: 500;
    margin-bottom: 10px;
}

h1 span {
    color: #7ccfff;
}

.subtitle {
    font-size: 14px;
    color: #9fb0bd;
    margin-bottom: 30px;
}

.form-label {
    font-size: 11px;
    color: #6f8596;
    margin-bottom: 8px;
    display: block;
}

select {
    width: 100%;
    padding: 14px;
    background: #0c161d;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #e6edf3;
    margin-bottom: 14px;
}

select:focus {
    outline: none;
    border-color: #4fa3d1;
}

.main-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 6px;
    background: #4fa3d1;
    color: #08131a;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

.main-btn:hover {
    background: #6bbbe6;
}

.features {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.feature {
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 6px;
    font-size: 13px;
    color: #9fb0bd;
}

footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: #6f8596;
    border-top: 1px solid rgba(255,255,255,0.05);
}

@media (max-width: 600px) {
    nav {
        padding: 16px 20px;
    }

    .card {
        padding: 30px 20px;
    }

    h1 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">SchoolNet</div>
    <div class="nav-links">
        <button>Inicio</button>
        <button>Información</button>
    </div>
</nav>

<div class="main">
    <div class="card">

        <h1>Gestiona tu<br><span>vida académica</span></h1>

        <p class="subtitle">
            Accede a horarios, tareas y reportes desde una sola plataforma diseñada para estudiantes.
        </p>

        <label class="form-label">INSTITUCIÓN</label>

        <select id="colegio">
            <option value="">Selecciona una opción</option>
            <option value="colegio-santander.html">Colegio Técnico Francisco De Paula Santander</option>
            <option value="colegio-central.html">Instituto Central</option>
            <option value="colegio3.html">Liceo Moderno</option>
        </select>

        <button class="main-btn" onclick="ir()">Ingresar</button>

        <div class="features">
            <div class="feature">Eventos académicos</div>
            <div class="feature">Gestión de tareas</div>
            <div class="feature">Boletines</div>
            <div class="feature">Horarios</div>
        </div>

    </div>
</div>

<footer>
    © 2026 SchoolNet
</footer>

<script>
function ir() {
    const colegio = document.getElementById("colegio");
    if (colegio.value === "") {
        colegio.style.borderColor = "#ff5a5a";
        setTimeout(() => colegio.style.borderColor = "rgba(255,255,255,0.1)", 1500);
    } else {
        window.location.href = colegio.value;
    }
}
</script>

</body>
</html>
