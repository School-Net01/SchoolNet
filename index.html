<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolNet</title>

<!-- FUENTE MODERNA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    color: white;
    overflow: hidden;
}

/* ===== NAVBAR ===== */
nav {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 25px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 1px;
}

.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 18px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.nav-links button:hover {
    background: rgba(255,255,255,0.1);
}

/* ===== MAIN ===== */
.main {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== CARD ===== */
.card {
    width: 90%;
    max-width: 850px;
    padding: 60px;
    border-radius: 30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(25px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeUp 1s ease;
}

/* ===== TEXT ===== */
h1 {
    font-size: 50px;
    font-weight: 600;
    margin-bottom: 15px;
}

.subtitle {
    font-size: 18px;
    opacity: 0.8;
    margin-bottom: 50px;
}

/* ===== SEARCH BAR ===== */
.search-container {
    position: relative;
    width: 100%;
}

.search-container select {
    width: 100%;
    padding: 18px 20px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    outline: none;
    background: white;
    color: black;
    appearance: none;
}

.search-container::after {
    content: "▼";
    position: absolute;
    right: 20px;
    top: 18px;
    color: #333;
}

/* ===== BUTTON ===== */
.main-btn {
    margin-top: 20px;
    padding: 16px 40px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #00f2fe, #4facfe);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,255,255,0.4);
}

/* ===== FEATURES ===== */
.features {
    margin-top: 50px;
    display: flex;
    justify-content: space-between;
    gap: 15px;
    flex-wrap: wrap;
}

.feature {
    flex: 1;
    min-width: 120px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    font-size: 14px;
    transition: 0.3s;
}

.feature:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.15);
}

/* ===== FOOTER ===== */
footer {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
    font-size: 13px;
    opacity: 0.6;
}

/* ===== ANIMACIÓN ===== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
    .card {
        padding: 35px;
    }

    h1 {
        font-size: 32px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">SchoolNet</div>
    <div class="nav-links">
        <button>Inicio</button>
        <button>Información</button>
    </div>
</nav>

<!-- MAIN -->
<div class="main">
    <div class="card">

        <h1>Conecta tu mundo académico</h1>
        <div class="subtitle">
            Una plataforma moderna para estudiantes: horarios, tareas, eventos y más
        </div>

        <div class="search-container">
            <select id="colegio">
                <option value="">Selecciona tu colegio</option>
                <option value="colegio-santander.html">Colegio Técnico Francisco De Paula Santander</option>
                <option value="colegio2.html">Instituto Central</option>
                <option value="colegio3.html">Liceo Moderno</option>
            </select>
        </div>

        <button class="main-btn" onclick="ir()">Acceder</button>

        <div class="features">
            <div class="feature">📅 Eventos</div>
            <div class="feature">📝 Tareas</div>
            <div class="feature">📊 Boletines</div>
            <div class="feature">⏰ Horarios</div>
        </div>

    </div>
</div>

<footer>
    © 2026 SchoolNet — Plataforma educativa inteligente
</footer>

<script>
function ir() {
    let colegio = document.getElementById("colegio").value;

    if (colegio === "") {
        alert("Selecciona un colegio");
    } else {
        window.location.href = colegio;
    }
}
</script>

</body>
</html>
