<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolNet</title>

<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #00f2fe, #4facfe);
    overflow: hidden;
    color: white;
}

/* ===== NAVBAR ===== */
nav {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
}

.nav-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.nav-btn:hover {
    background: rgba(255,255,255,0.4);
}

/* ===== MAIN ===== */
.main {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 90%;
    max-width: 800px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 50px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

/* ===== TEXT ===== */
h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 18px;
    opacity: 0.9;
    margin-bottom: 40px;
}

/* ===== SEARCH ===== */
.search-box {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

select {
    padding: 15px;
    width: 300px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    outline: none;
}

button.main-btn {
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    background: #00ffe7;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button.main-btn:hover {
    background: #00c9b7;
}

/* ===== FEATURES ===== */
.features {
    margin-top: 40px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 15px;
}

.feature {
    background: rgba(255,255,255,0.15);
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 14px;
}

/* ===== FOOTER ===== */
footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 13px;
    opacity: 0.8;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
    h1 {
        font-size: 32px;
    }

    .card {
        padding: 30px;
    }

    select {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">SchoolNet</div>
    <button class="nav-btn">Sobre Nosotros</button>
</nav>

<!-- MAIN -->
<div class="main">
    <div class="card">
        <h1>Tu vida académica, organizada</h1>
        <div class="subtitle">
            Accede a horarios, tareas, eventos y boletines en un solo lugar
        </div>

        <!-- SEARCH -->
        <div class="search-box">
            <select id="colegio">
                <option value="">Selecciona tu colegio</option>
                <option value="colegio1.html">Colegio Nacional</option>
                <option value="colegio2.html">Instituto Central</option>
                <option value="colegio3.html">Liceo Moderno</option>
            </select>

            <button class="main-btn" onclick="ir()">Entrar</button>
        </div>

        <!-- FEATURES -->
        <div class="features">
            <div class="feature">📅 Eventos</div>
            <div class="feature">📝 Tareas</div>
            <div class="feature">📊 Boletines</div>
            <div class="feature">⏰ Horarios</div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 SchoolNet | Plataforma estudiantil
</footer>

<script>
function ir() {
    let colegio = document.getElementById("colegio").value;

    if (colegio === "") {
        alert("Selecciona un colegio primero");
    } else {
        window.location.href = colegio;
    }
}
</script>

</body>
</html>
