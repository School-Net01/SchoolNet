<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SchoolNet | Colegio Técnico Francisco De Paula Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0a0f1c;
    color:#e6edf3;
    display:flex;
}

/* ===== FONDO SEGURO ===== */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(0,180,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(0,120,255,0.08), transparent 40%);
    z-index:-1;
    pointer-events:none;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:260px;
    height:100vh;
    background:#0d1324;
    border-right:1px solid rgba(255,255,255,0.05);
    padding:25px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:18px;
    font-weight:600;
    margin-bottom:30px;
}

select{
    padding:12px;
    background:#111827;
    border:none;
    border-radius:10px;
    color:white;
    margin-bottom:25px;
    cursor:pointer;
}

.menu button{
    width:100%;
    padding:12px;
    border:none;
    background:none;
    color:#9aa4b2;
    border-radius:10px;
    text-align:left;
    cursor:pointer;
    transition:0.2s;
}

.menu button:hover,
.menu button.active{
    background:#111827;
    color:white;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    padding:30px 40px;
    position:relative;
}

/* ===== TOPBAR ===== */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    background:#111827;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
}

/* ===== DASHBOARD ===== */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:14px;
    transition:0.25s;
    border:1px solid transparent;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#38bdf8;
}

/* ===== CONTENT ===== */
.content{
    background:#111827;
    padding:25px;
    border-radius:14px;
}

/* ===== TABLE ===== */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    padding:12px;
    text-align:left;
}

th{
    color:#9aa4b2;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover{
    background:rgba(255,255,255,0.03);
}

/* ===== NIVELES ===== */
.alto{color:#22c55e}
.medio{color:#facc15}
.bajo{color:#ef4444}

/* ===== BOTON ===== */
.logout{
    margin-top:auto;
    padding:12px;
    border:none;
    background:#111827;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">SchoolNet</div>

    <select id="grado" onchange="cambiarGrado()">
        <option value="">Seleccionar grado</option>
        <option value="10">Grado 10</option>
        <option value="11">Grado 11</option>
    </select>

    <div class="menu">
        <button class="active" onclick="nav(this,'inicio')">Inicio</button>
        <button onclick="nav(this,'boletines')">Boletines</button>
        <button onclick="nav(this,'eventos')">Eventos</button>
        <button onclick="nav(this,'tareas')">Tareas</button>
    </div>

    <button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
    <div>
        <h1>Colegio Técnico Francisco De Paula Santander</h1>
        <p id="info">Selecciona un grado</p>
    </div>

    <input type="text" class="search" placeholder="Buscar estudiante..." onkeyup="buscar(this.value)">
</div>

<div id="contenido"></div>

</div>

<script>

/* ===== GENERADOR ===== */
function generarEstudiantes(){
    const nombres = ["Juan","Laura","Carlos","María","Pedro","Sofía","Andrés","Camila","Luis","Valentina","Mateo","Sara","Daniel","Paula","David","Ana","Jorge","Lucía"];
    
    return nombres.slice(0,15).map(n=>({
        nombre:n,
        mat:(Math.random()*2+3).toFixed(1),
        esp:(Math.random()*2+3).toFixed(1),
        ing:(Math.random()*2+3).toFixed(1)
    }));
}

const data = {
    10: generarEstudiantes(),
    11: generarEstudiantes()
};

let gradoActual="";

/* ===== UTIL ===== */
function promedio(e){
    return ((+e.mat + +e.esp + +e.ing)/3).toFixed(2);
}

function nivel(n){
    if(n>=4.5)return "alto";
    if(n>=4)return "medio";
    return "bajo";
}

/* ===== CONTROL ===== */
function cambiarGrado(){
    gradoActual=document.getElementById("grado").value;
    document.getElementById("info").innerText="Grado "+gradoActual;
    render("inicio");
}

function nav(btn,sec){
    document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render(sec);
}

/* ===== RENDER ===== */
function render(sec){

if(!gradoActual){
    contenido.innerHTML="<p>Selecciona un grado primero</p>";
    return;
}

let estudiantes = data[gradoActual];

if(sec==="inicio"){
    let prom = (estudiantes.reduce((a,e)=>a+ +promedio(e),0)/estudiantes.length).toFixed(2);

    contenido.innerHTML=`
    <div class="dashboard">
        <div class="card"><h2>${estudiantes.length}</h2><p>Estudiantes</p></div>
        <div class="card"><h2>${prom}</h2><p>Promedio</p></div>
        <div class="card"><h2>${Math.floor(Math.random()*5+3)}</h2><p>Tareas</p></div>
    </div>`;
}

if(sec==="boletines"){
    let html=`<div class="content"><h3>Boletines</h3><table>
    <tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th><th>Prom</th></tr>`;

    estudiantes.forEach(e=>{
        let p=promedio(e);
        html+=`
        <tr>
        <td>${e.nombre}</td>
        <td>${e.mat}</td>
        <td>${e.esp}</td>
        <td>${e.ing}</td>
        <td class="${nivel(p)}">${p}</td>
        </tr>`;
    });

    html+="</table></div>";
    contenido.innerHTML=html;
}

if(sec==="eventos"){
    contenido.innerHTML=`<div class="content">
    <h3>Eventos</h3>
    <p>📅 Entrega de boletines - 25 abril</p>
    <p>🎓 Feria académica - 10 mayo</p>
    </div>`;
}

if(sec==="tareas"){
    contenido.innerHTML=`<div class="content">
    <h3>Tareas</h3>
    <p>Matemáticas: Álgebra</p>
    <p>Español: Ensayo</p>
    </div>`;
}

}

/* ===== BUSCAR ===== */
function buscar(txt){
if(!gradoActual)return;

txt=txt.toLowerCase();

let lista = data[gradoActual].filter(e=>e.nombre.toLowerCase().includes(txt));

let html=`<div class="content"><h3>Resultados</h3><table>
<tr><th>Nombre</th><th>Promedio</th></tr>`;

lista.forEach(e=>{
html+=`<tr><td>${e.nombre}</td><td>${promedio(e)}</td></tr>`;
});

html+="</table></div>";
contenido.innerHTML=html;
}

function salir(){
window.location.href="index.html";
}

</script>

</body>
</html>
