<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegio Técnico Francisco De Paula Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Inter', sans-serif;
    display: flex;
    background: #0b1120;
    color: #e5e7eb;
    overflow: hidden;
}

/* ===== FONDO ESTRELLAS ===== */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #38bdf8;
    opacity: 0.7;
    animation: move 10s linear infinite;
}

@keyframes move {
    from { transform: translateY(0); }
    to { transform: translateY(100vh); }
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 260px;
    height: 100vh;
    background: rgba(2,6,23,0.9);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1e293b;
    z-index: 1;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 40px;
}

/* ===== SELECT ===== */
select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
    margin-bottom: 30px;
}

/* ===== MENU ===== */
.menu button {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    background: transparent;
    border: none;
    color: #94a3b8;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
}

.menu button:hover,
.menu button.active {
    background: #1e293b;
    color: white;
}

/* ===== MAIN ===== */
.main {
    flex: 1;
    padding: 40px;
    position: relative;
    z-index: 1;
}

/* ===== HEADER ===== */
.header {
    margin-bottom: 30px;
}

.header h1 {
    font-size: 26px;
    font-weight: 600;
}

.header p {
    color: #94a3b8;
    margin-top: 5px;
}

/* ===== DASHBOARD ===== */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat {
    background: rgba(30,41,59,0.7);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* ===== CONTENT ===== */
.content {
    background: rgba(30,41,59,0.7);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 12px;
}

th {
    background: #1e293b;
    text-align: left;
}

tr:nth-child(even) {
    background: #020617;
}

/* ===== LOGOUT ===== */
.logout {
    margin-top: auto;
    padding: 12px;
    border: none;
    background: #1e293b;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- ESTRELLAS -->
<div class="stars" id="stars"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">SchoolNet</div>

    <select id="grado" onchange="cambiarGrado()">
        <option value="">Selecciona grado</option>
        <option value="10">Grado 10</option>
        <option value="11">Grado 11</option>
    </select>

    <div class="menu">
        <button onclick="mostrar('inicio')" class="active">Inicio</button>
        <button onclick="mostrar('eventos')">Eventos</button>
        <button onclick="mostrar('tareas')">Tareas</button>
        <button onclick="mostrar('horarios')">Horarios</button>
        <button onclick="mostrar('boletines')">Boletines</button>
    </div>

    <button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Colegio Técnico Francisco De Paula Santander</h1>
        <p id="infoGrado">Selecciona un grado para visualizar la información académica</p>
    </div>

    <div id="contenido"></div>

</div>

<script>

// ESTRELLAS
for (let i = 0; i < 60; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.getElementById("stars").appendChild(star);
}

let grado = "";

function cambiarGrado() {
    grado = document.getElementById("grado").value;
    document.getElementById("infoGrado").innerText = grado ? "Grado " + grado : "Selecciona un grado";
    mostrar("inicio");
}

function mostrar(seccion) {

    let cont = document.getElementById("contenido");

    if (!grado) {
        cont.innerHTML = "<p>Selecciona un grado para continuar.</p>";
        return;
    }

    if (seccion === "inicio") {
        cont.innerHTML = `
        <div class="dashboard">
            <div class="stat"><h2>6</h2><p>Tareas pendientes</p></div>
            <div class="stat"><h2>3</h2><p>Eventos próximos</p></div>
            <div class="stat"><h2>5</h2><p>Materias activas</p></div>
        </div>
        `;
    }

    if (seccion === "boletines") {
        cont.innerHTML = `
        <div class="content">
            <h3>Registro académico del curso</h3>
            <table>
                <tr>
                    <th>Estudiante</th>
                    <th>Matemáticas</th>
                    <th>Español</th>
                    <th>Inglés</th>
                </tr>
                <tr><td>Juan Pérez</td><td>4.5</td><td>4.2</td><td>4.7</td></tr>
                <tr><td>Laura Gómez</td><td>4.8</td><td>4.6</td><td>4.9</td></tr>
                <tr><td>Carlos Ramírez</td><td>4.0</td><td>3.9</td><td>4.2</td></tr>
                <tr><td>María Torres</td><td>4.7</td><td>4.5</td><td>4.8</td></tr>
            </table>
        </div>
        `;
    }

    if (seccion === "eventos") {
        cont.innerHTML = `<div class="content"><h3>Eventos académicos</h3><p>Reunión - 22 abril</p></div>`;
    }

    if (seccion === "tareas") {
        cont.innerHTML = `<div class="content"><h3>Tareas</h3><p>Actividad asignada</p></div>`;
    }

    if (seccion === "horarios") {
        cont.innerHTML = `<div class="content"><h3>Horarios</h3><p>Información semanal</p></div>`;
    }
}

function salir() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
