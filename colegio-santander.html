<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegio Técnico Francisco De Paula Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Poppins', sans-serif;
    display: flex;
    background: #0f172a;
    color: #e2e8f0;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 260px;
    height: 100vh;
    background: #020617;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    font-size: 18px;
    margin-bottom: 40px;
    font-weight: 500;
}

/* ===== SELECT GRADO ===== */
.grado-select {
    margin-bottom: 30px;
}

.grado-select select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: #e2e8f0;
}

/* ===== MENU ===== */
.menu button {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    background: transparent;
    border: none;
    color: #cbd5f5;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    background: #1e293b;
    color: white;
}

/* ===== MAIN ===== */
.main {
    flex: 1;
    padding: 40px;
}

/* ===== HEADER ===== */
.header {
    margin-bottom: 30px;
}

.header h1 {
    font-size: 24px;
    font-weight: 500;
}

.header span {
    font-size: 14px;
    color: #94a3b8;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* ===== CARD ===== */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
    background: #334155;
}

.card h3 {
    font-size: 16px;
    margin-bottom: 8px;
}

.card p {
    font-size: 14px;
    color: #cbd5e1;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 700px) {
    .sidebar {
        display: none;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>SchoolNet</h2>

    <div class="grado-select">
        <select id="grado" onchange="cambiarGrado()">
            <option value="">Selecciona grado</option>
            <option value="grado6">Grado 6</option>
            <option value="grado7">Grado 7</option>
            <option value="grado8">Grado 8</option>
            <option value="grado9">Grado 9</option>
            <option value="grado10">Grado 10</option>
            <option value="grado11">Grado 11</option>
        </select>
    </div>

    <div class="menu">
        <button onclick="mostrar('eventos')">Eventos</button>
        <button onclick="mostrar('tareas')">Tareas</button>
        <button onclick="mostrar('horarios')">Horarios</button>
        <button onclick="mostrar('boletines')">Boletines</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Colegio Técnico Francisco De Paula Santander</h1>
        <span id="gradoTexto">Selecciona un grado para ver la información</span>
    </div>

    <div id="contenido" class="grid"></div>

</div>

<script>

let gradoActual = "";

// DATOS POR GRADO
const datos = {
    grado10: {
        eventos: [
            {titulo: "Reunión académica", desc: "22 de abril - 7:00 AM"},
        ],
        tareas: [
            {titulo: "Matemáticas", desc: "Ejercicios de funciones"},
        ],
        horarios: [
            {titulo: "Lunes", desc: "Matemáticas, Física, Inglés"},
        ],
        boletines: [
            {titulo: "Primer periodo", desc: "Disponible 30 de abril"},
        ]
    },

    grado11: {
        eventos: [
            {titulo: "Simulacro ICFES", desc: "28 de abril"},
        ],
        tareas: [
            {titulo: "Filosofía", desc: "Ensayo argumentativo"},
        ],
        horarios: [
            {titulo: "Martes", desc: "Química, Sociales, Español"},
        ],
        boletines: [
            {titulo: "Último informe", desc: "Entrega final en mayo"},
        ]
    }
};

// CAMBIAR GRADO
function cambiarGrado() {
    gradoActual = document.getElementById("grado").value;
    document.getElementById("gradoTexto").innerText = gradoActual ? "Información para " + gradoActual : "Selecciona un grado";
    document.getElementById("contenido").innerHTML = "";
}

// MOSTRAR SECCIÓN
function mostrar(seccion) {

    if (!gradoActual) {
        alert("Selecciona primero un grado");
        return;
    }

    let contenedor = document.getElementById("contenido");
    contenedor.innerHTML = "";

    let lista = datos[gradoActual][seccion];

    lista.forEach(item => {
        contenedor.innerHTML += `
            <div class="card">
                <h3>${item.titulo}</h3>
                <p>${item.desc}</p>
            </div>
        `;
    });
}

</script>

</body>
</html>
