<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolNet | Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== VARIABLES ===== */
:root{
--bg:#0a0f1c;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);

--text:#e5e7eb;
--soft:#9ca3af;

--primary:#5eead4;
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(94,234,212,0.15), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(96,165,250,0.15), transparent 40%),
#0a0f1c;

color:var(--text);
display:flex;
cursor:none;
overflow:hidden;
}

/* ===== CURSOR ===== */
.cursor{
width:18px;height:18px;
border:2px solid var(--primary);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
}

.cursor-f{
width:35px;height:35px;
background:rgba(94,234,212,0.1);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9998;
}

/* ===== TRAIL ===== */
#trail-container{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:9997;
}

.trail{
width:8px;
height:8px;
border-radius:50%;
position:absolute;
background:rgba(94,234,212,0.6);
filter:blur(6px);
animation:fadeOut 0.6s linear forwards;
}

@keyframes fadeOut{
to{
opacity:0;
transform:scale(2);
}
}

/* ===== SIDEBAR ===== */
.sidebar{
width:260px;
height:100vh;
padding:25px;
display:flex;
flex-direction:column;

background:var(--glass);
backdrop-filter:blur(15px);
border-right:1px solid var(--border);
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:25px;
}

/* SELECT */
select{
padding:12px;
background:#020617;
color:#fff;
border:1px solid var(--border);
border-radius:10px;
margin-bottom:25px;
}

/* MENU */
.menu button{
width:100%;
padding:12px;
background:none;
border:none;
color:var(--soft);
text-align:left;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.menu button:hover,
.menu button.active{
background:rgba(94,234,212,0.08);
color:#fff;
box-shadow:0 0 10px rgba(94,234,212,0.2);
}

/* ===== MAIN ===== */
.main{
flex:1;
padding:30px;
overflow-y:auto;
height:100vh;
}

/* HEADER */
.header{
padding:20px;
border-radius:16px;
margin-bottom:20px;

background:var(--glass);
backdrop-filter:blur(10px);
border:1px solid var(--border);
}

.header h1{
font-size:24px;
font-weight:600;
}

.header p{
font-size:13px;
color:var(--soft);
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:20px;
}

.search{
background:#020617;
border:none;
padding:12px;
border-radius:10px;
color:white;
width:240px;
}

.search:focus{
outline:none;
box-shadow:0 0 12px rgba(94,234,212,0.2);
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
padding:20px;
border-radius:16px;
background:var(--glass);
backdrop-filter:blur(10px);
border:1px solid var(--border);
transition:0.3s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg, transparent, rgba(94,234,212,0.15), transparent);
opacity:0;
transition:0.3s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.5),
           0 0 20px rgba(94,234,212,0.15);
}

.card h2{font-size:22px}
.card p{color:var(--soft)}

/* CONTENT */
.content{
background:var(--glass);
padding:20px;
border-radius:16px;
border:1px solid var(--border);
}

/* TABLE */
table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:10px;
}

th{
color:var(--soft);
border-bottom:1px solid var(--border);
}

/* NOTAS */
.alto{color:#4ade80}
.medio{color:#facc15}
.bajo{color:#f87171}

/* LIST */
.item{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BOTON */
.logout{
margin-top:auto;
padding:12px;
background:#020617;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.logout:hover{
box-shadow:0 0 10px rgba(94,234,212,0.2);
}

</style>
</head>

<body>

<div class="cursor"></div>
<div class="cursor-f"></div>
<div id="trail-container"></div>

<div class="sidebar">
<div class="logo">SchoolNet</div>

<select id="grado" onchange="cambiarGrado()">
<option value="">Seleccionar grado</option>
<option value="10">Grado 10</option>
<option value="11">Grado 11</option>
</select>

<div class="menu">
<button class="active" onclick="nav(this,'inicio')">Inicio</button>
<button onclick="nav(this,'boletines')">Boletines</button>
<button onclick="nav(this,'tareas')">Tareas</button>
<button onclick="nav(this,'eventos')">Eventos</button>
</div>

<button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<div class="main">

<div class="header">
<h1>Colegio Técnico Francisco De Paula Santander</h1>
<p id="info">Selecciona un grado</p>
</div>

<div class="topbar">
<input type="text" class="search" placeholder="Buscar estudiante..." onkeyup="buscar(this.value)">
</div>

<div id="contenido"></div>

</div>

<script>

/* CURSOR + TRAIL */
const c=document.querySelector(".cursor");
const f=document.querySelector(".cursor-f");

document.addEventListener("mousemove",e=>{
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";

f.style.left=e.clientX+"px";
f.style.top=e.clientY+"px";

/* TRAIL */
let trail=document.createElement("div");
trail.className="trail";
trail.style.left=e.clientX+"px";
trail.style.top=e.clientY+"px";

document.getElementById("trail-container").appendChild(trail);

setTimeout(()=>trail.remove(),600);
});

let grado="";

/* DATOS */
const datos={
10:{
estudiantes:[
{name:"Juan Pérez",mat:4.5,esp:4.2,ing:4.6},
{name:"Laura Gómez",mat:4.8,esp:4.6,ing:4.9},
{name:"Carlos Ramírez",mat:4.0,esp:3.9,ing:4.2},
{name:"María Torres",mat:4.7,esp:4.5,ing:4.8},
{name:"Sofía Díaz",mat:4.9,esp:4.8,ing:5.0},
{name:"Andrés López",mat:3.8,esp:4.0,ing:3.9},
{name:"Mateo Rojas",mat:4.3,esp:4.2,ing:4.1},
{name:"Valentina Ruiz",mat:4.6,esp:4.4,ing:4.7},
{name:"Daniel Castro",mat:3.7,esp:3.8,ing:3.9},
{name:"Camila Herrera",mat:4.5,esp:4.6,ing:4.4},
{name:"David Moreno",mat:4.2,esp:4.1,ing:4.3},
{name:"Paula Vega",mat:4.7,esp:4.5,ing:4.8},
{name:"Jorge Silva",mat:3.9,esp:3.8,ing:4.0},
{name:"Natalia Cruz",mat:4.6,esp:4.7,ing:4.5},
{name:"Luis Torres",mat:4.1,esp:4.0,ing:4.2}
],
tareas:["Álgebra pág 45","Ensayo español","Taller inglés","Biología resumen","Historia mapa conceptual","Química ejercicios"],
eventos:["Examen matemáticas 22 abril","Reunión padres 25 abril","Entrega tareas 28 abril"]
},

11:{
estudiantes:[
{name:"Sebastián Gil",mat:4.8,esp:4.7,ing:4.9},
{name:"Daniela Pardo",mat:4.6,esp:4.5,ing:4.7},
{name:"Kevin Vargas",mat:3.9,esp:4.0,ing:3.8},
{name:"Sara Méndez",mat:4.7,esp:4.8,ing:4.6},
{name:"Valeria Peña",mat:4.9,esp:4.8,ing:5.0},
{name:"Felipe Gómez",mat:4.1,esp:4.2,ing:4.3},
{name:"Camilo Ortiz",mat:3.8,esp:3.9,ing:4.0},
{name:"Nicolás Reyes",mat:4.3,esp:4.2,ing:4.4},
{name:"Lucía Herrera",mat:4.6,esp:4.7,ing:4.5},
{name:"Tomás Duarte",mat:4.2,esp:4.1,ing:4.3},
{name:"Isabella Ríos",mat:4.8,esp:4.7,ing:4.9},
{name:"Samuel Castro",mat:3.7,esp:3.8,ing:3.9},
{name:"Juliana Torres",mat:4.5,esp:4.6,ing:4.7},
{name:"Diego Molina",mat:4.0,esp:4.1,ing:4.2},
{name:"Juanita León",mat:4.5,esp:4.6,ing:4.4}
],
tareas:["Proyecto final","Simulacro ICFES","Informe ciencias","Exposición inglés","Ensayo filosofía","Laboratorio química"],
eventos:["Entrega boletines 20 abril","Ensayo grado","Simulacro final"]
}
};

function cambiarGrado(){
grado=document.getElementById("grado").value;
document.getElementById("info").innerText=grado?"Grado "+grado:"Selecciona un grado";
render("inicio");
}

function nav(btn,sec){
document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render(sec);
}

function notaColor(n){
if(n>=4.5)return "alto";
if(n>=4.0)return "medio";
return "bajo";
}

function render(sec){
let cont=document.getElementById("contenido");

if(!grado){
cont.innerHTML="<p>Selecciona un grado para ver la información.</p>";
return;
}

let data=datos[grado];

if(sec==="inicio"){
cont.innerHTML=`
<div class="dashboard">
<div class="card"><h2>${data.estudiantes.length}</h2><p>Estudiantes</p></div>
<div class="card"><h2>${data.tareas.length}</h2><p>Tareas pendientes</p></div>
<div class="card"><h2>${data.eventos.length}</h2><p>Eventos</p></div>
</div>`;
}

if(sec==="boletines"){
let html=`<div class="content"><h3>Boletines</h3><table>
<tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th></tr>`;
data.estudiantes.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td class="${notaColor(e.mat)}">${e.mat}</td>
<td class="${notaColor(e.esp)}">${e.esp}</td>
<td class="${notaColor(e.ing)}">${e.ing}</td>
</tr>`;
});
html+=`</table></div>`;
cont.innerHTML=html;
}

if(sec==="tareas"){
let html=`<div class="content"><h3>Tareas</h3>`;
data.tareas.forEach(t=>{
html+=`<div class="item">📘 ${t}</div>`;
});
html+=`</div>`;
cont.innerHTML=html;
}

if(sec==="eventos"){
let html=`<div class="content"><h3>Eventos</h3>`;
data.eventos.forEach(e=>{
html+=`<div class="item">📅 ${e}</div>`;
});
html+=`</div>`;
cont.innerHTML=html;
}
}

function buscar(txt){
if(!grado)return;
txt=txt.toLowerCase();
let lista=datos[grado].estudiantes.filter(e=>e.name.toLowerCase().includes(txt));

let cont=document.getElementById("contenido");

let html=`<div class="content"><h3>Resultados</h3><table>
<tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th></tr>`;
lista.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td>${e.mat}</td>
<td>${e.esp}</td>
<td>${e.ing}</td>
</tr>`;
});
html+=`</table></div>`;
cont.innerHTML=html;
}

function salir(){
window.location.href="index.html";
}

</script>

</body>
</html>
