<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SchoolNet | Colegio Técnico Francisco De Paula Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0a0f1c;
    color:#e6edf3;
    display:flex;
}

/* ================= FONDO ================= */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(0,180,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(0,120,255,0.08), transparent 40%);
    z-index:-1;
    pointer-events:none;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    height:100vh;
    background:rgba(13,19,36,0.9);
    backdrop-filter:blur(10px);
    border-right:1px solid rgba(255,255,255,0.05);
    padding:25px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:20px;
    font-weight:600;
    margin-bottom:30px;
}

select{
    padding:12px;
    background:#111827;
    border:none;
    border-radius:10px;
    color:white;
    margin-bottom:25px;
    cursor:pointer;
}

.menu button{
    width:100%;
    padding:12px;
    border:none;
    background:none;
    color:#9aa4b2;
    border-radius:10px;
    text-align:left;
    cursor:pointer;
    transition:0.2s;
}

.menu button:hover,
.menu button.active{
    background:#111827;
    color:white;
}

/* ================= MAIN ================= */
.main{
    flex:1;
    padding:30px 40px;
    position:relative;
}

/* ================= TOPBAR ================= */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    background:#111827;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
}

/* ================= DASHBOARD ================= */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:14px;
    transition:0.3s;
    border:1px solid transparent;
}

.card:hover{
    transform:translateY(-6px);
    border-color:#38bdf8;
    box-shadow:0 0 25px rgba(56,189,248,0.2);
}

/* ================= CONTENT ================= */
.content{
    background:#111827;
    padding:25px;
    border-radius:14px;
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    padding:12px;
}

th{
    color:#9aa4b2;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover{
    background:rgba(255,255,255,0.03);
    cursor:pointer;
}

/* ================= BADGES ================= */
.badge{
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
}

.alto{background:#22c55e20;color:#22c55e}
.medio{background:#facc1520;color:#facc15}
.bajo{background:#ef444420;color:#ef4444}

/* ================= CALENDARIO ================= */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    padding:12px;
    background:#020617;
    text-align:center;
    border-radius:8px;
}

.event{
    background:#38bdf8;
    color:#000;
}

/* ================= MODAL ================= */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111827;
    padding:25px;
    border-radius:14px;
    width:300px;
}

/* ================= BOTON ================= */
.logout{
    margin-top:auto;
    padding:12px;
    border:none;
    background:#111827;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">SchoolNet</div>

    <select id="grado" onchange="cambiarGrado()">
        <option value="">Seleccionar grado</option>
        <option value="10">Grado 10</option>
        <option value="11">Grado 11</option>
    </select>

    <div class="menu">
        <button class="active" onclick="nav(this,'inicio')">Inicio</button>
        <button onclick="nav(this,'boletines')">Boletines</button>
        <button onclick="nav(this,'eventos')">Eventos</button>
        <button onclick="nav(this,'tareas')">Tareas</button>
        <button onclick="nav(this,'calendario')">Calendario</button>
    </div>

    <button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<div class="main">

<div class="topbar">
    <div>
        <h1>Colegio Técnico Francisco De Paula Santander</h1>
        <p id="info">Selecciona un grado</p>
    </div>

    <input type="text" class="search" placeholder="Buscar estudiante..." onkeyup="buscar(this.value)">
</div>

<div id="contenido"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>

/* ================= DATOS ================= */
const data = {
10: [
{nombre:"Juan Pérez",mat:4.5,esp:4.2,ing:4.6},
{nombre:"Laura Gómez",mat:4.8,esp:4.6,ing:4.9},
{nombre:"Carlos Ramírez",mat:4.0,esp:3.9,ing:4.2},
{nombre:"María Torres",mat:4.7,esp:4.5,ing:4.8},
{nombre:"Pedro López",mat:3.8,esp:4.0,ing:3.9},
{nombre:"Sofía Castro",mat:4.9,esp:4.7,ing:5.0},
{nombre:"Andrés Rojas",mat:4.2,esp:4.1,ing:4.3},
{nombre:"Camila Díaz",mat:4.6,esp:4.4,ing:4.7},
{nombre:"Luis Herrera",mat:3.7,esp:3.9,ing:4.0},
{nombre:"Valentina Ruiz",mat:4.8,esp:4.9,ing:4.7},
{nombre:"Mateo Vargas",mat:4.3,esp:4.2,ing:4.1},
{nombre:"Sara Medina",mat:4.7,esp:4.6,ing:4.8},
{nombre:"Daniel Ortiz",mat:3.9,esp:4.0,ing:3.8},
{nombre:"Paula Jiménez",mat:4.6,esp:4.7,ing:4.5},
{nombre:"David Moreno",mat:4.1,esp:4.2,ing:4.0}
],
11: [
{nombre:"Alejandro Castillo",mat:4.6,esp:4.4,ing:4.7},
{nombre:"Natalia Pineda",mat:4.9,esp:4.8,ing:5.0},
{nombre:"Sebastián Cruz",mat:4.2,esp:4.1,ing:4.3},
{nombre:"Valeria Mendoza",mat:4.7,esp:4.6,ing:4.8},
{nombre:"Juan David León",mat:3.9,esp:4.0,ing:3.8},
{nombre:"Daniela Suárez",mat:4.8,esp:4.7,ing:4.9},
{nombre:"Esteban Vega",mat:4.3,esp:4.2,ing:4.1},
{nombre:"Isabella Romero",mat:4.9,esp:5.0,ing:4.8},
{nombre:"Felipe Guerrero",mat:3.8,esp:3.9,ing:4.0},
{nombre:"Camilo Navarro",mat:4.5,esp:4.4,ing:4.6},
{nombre:"Gabriela Torres",mat:4.7,esp:4.6,ing:4.8},
{nombre:"Samuel Peña",mat:4.0,esp:4.1,ing:4.2},
{nombre:"Juliana Ríos",mat:4.8,esp:4.7,ing:4.9},
{nombre:"Tomás Cárdenas",mat:4.2,esp:4.3,ing:4.1},
{nombre:"Luciana Méndez",mat:4.9,esp:4.8,ing:5.0}
]
};

let gradoActual="";

/* ================= FUNCIONES ================= */
function promedio(e){
    return ((e.mat + e.esp + e.ing)/3).toFixed(2);
}

function nivel(n){
    if(n>=4.5)return "alto";
    if(n>=4)return "medio";
    return "bajo";
}

function cambiarGrado(){
    gradoActual=document.getElementById("grado").value;
    info.innerText="Grado "+gradoActual;
    render("inicio");
}

function nav(btn,sec){
    document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render(sec);
}

/* ================= RENDER ================= */
function render(sec){

if(!gradoActual){
    contenido.innerHTML="<p>Selecciona un grado</p>";
    return;
}

let estudiantes=data[gradoActual];

if(sec==="inicio"){
    let prom=(estudiantes.reduce((a,e)=>a+ +promedio(e),0)/estudiantes.length).toFixed(2);

    contenido.innerHTML=`
    <div class="dashboard">
        <div class="card"><h2>${estudiantes.length}</h2><p>Estudiantes</p></div>
        <div class="card"><h2>${prom}</h2><p>Promedio</p></div>
        <div class="card"><h2>6</h2><p>Tareas</p></div>
    </div>`;
}

if(sec==="boletines"){
    let html=`<div class="content"><h3>Boletines</h3><table>
    <tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th><th>Prom</th></tr>`;

    estudiantes.forEach((e,i)=>{
        let p=promedio(e);
        html+=`
        <tr onclick="verEstudiante(${i})">
        <td>${e.nombre}</td>
        <td>${e.mat}</td>
        <td>${e.esp}</td>
        <td>${e.ing}</td>
        <td class="${nivel(p)}">${p}</td>
        </tr>`;
    });

    html+="</table></div>";
    contenido.innerHTML=html;
}

if(sec==="eventos"){
    contenido.innerHTML=`<div class="content"><h3>Eventos</h3>
    <p>Entrega de boletines</p>
    <p>Feria académica</p></div>`;
}

if(sec==="tareas"){
    contenido.innerHTML=`<div class="content"><h3>Tareas</h3>
    <p>Álgebra</p>
    <p>Ensayo</p></div>`;
}

if(sec==="calendario"){
    let dias="";
    for(let i=1;i<=30;i++){
        dias+=`<div class="day ${i==10?"event":""}">${i}</div>`;
    }
    contenido.innerHTML=`<div class="content"><h3>Calendario</h3><div class="calendar">${dias}</div></div>`;
}

}

/* ================= MODAL ================= */
function verEstudiante(i){
let e=data[gradoActual][i];

modal.style.display="flex";
modalContent.innerHTML=`
<h3>${e.nombre}</h3>
<p>Mat: ${e.mat}</p>
<p>Esp: ${e.esp}</p>
<p>Ing: ${e.ing}</p>
<p>Prom: ${promedio(e)}</p>
<button onclick="cerrarModal()">Cerrar</button>
`;
}

function cerrarModal(){
modal.style.display="none";
}

/* ================= BUSCAR ================= */
function buscar(txt){
if(!gradoActual)return;

txt=txt.toLowerCase();

let lista=data[gradoActual].filter(e=>e.nombre.toLowerCase().includes(txt));

let html=`<div class="content"><h3>Resultados</h3><table>
<tr><th>Nombre</th><th>Promedio</th></tr>`;

lista.forEach(e=>{
html+=`<tr><td>${e.nombre}</td><td>${promedio(e)}</td></tr>`;
});

html+="</table></div>";
contenido.innerHTML=html;
}

function salir(){
window.location.href="index.html";
}

</script>

</body>
</html>
