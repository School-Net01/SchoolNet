<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolNet | Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#020617;
    color:#e5e7eb;
    display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:250px;
    height:100vh;
    padding:25px;
    background:#020617;
    border-right:1px solid rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
}

.logo{
    font-weight:600;
    margin-bottom:30px;
    font-size:18px;
}

/* SELECT */
select{
    padding:12px;
    background:#020617;
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
    border-radius:8px;
    margin-bottom:25px;
}

/* MENU */
.menu button{
    width:100%;
    padding:12px;
    border:none;
    background:none;
    color:#9ca3af;
    text-align:left;
    border-radius:8px;
    cursor:pointer;
}

.menu button:hover,
.menu button.active{
    background:#111827;
    color:#fff;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

/* HEADER PROFESIONAL */
.header{
    margin-bottom:25px;
}

.header h1{
    font-size:22px;
    font-weight:600;
}

.header p{
    font-size:14px;
    color:#9ca3af;
    margin-top:5px;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.search{
    background:#111827;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    color:white;
    width:240px;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:18px;
    border-radius:10px;
}

.card h2{
    font-size:22px;
}

.card p{
    color:#9ca3af;
    font-size:13px;
}

/* CONTENT */
.content{
    background:#111827;
    padding:20px;
    border-radius:10px;
}

/* TABLE */
table{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:left;
}

th{
    color:#9ca3af;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* NOTAS */
.alto{color:#22c55e}
.medio{color:#facc15}
.bajo{color:#ef4444}

/* LISTAS */
.list-item{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BOTON */
.logout{
    margin-top:auto;
    padding:12px;
    background:#111827;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">SchoolNet</div>

    <select id="grado" onchange="cambiarGrado()">
        <option value="">Seleccionar grado</option>
        <option value="10">Grado 10</option>
        <option value="11">Grado 11</option>
    </select>

    <div class="menu">
        <button class="active" onclick="nav(this,'inicio')">Inicio</button>
        <button onclick="nav(this,'boletines')">Boletines</button>
        <button onclick="nav(this,'tareas')">Tareas</button>
        <button onclick="nav(this,'eventos')">Eventos</button>
    </div>

    <button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<div class="main">

<div class="header">
    <h1>Colegio Técnico Francisco De Paula Santander</h1>
    <p id="info">Selecciona un grado</p>
</div>

<div class="topbar">
    <input type="text" class="search" placeholder="Buscar estudiante..." onkeyup="buscar(this.value)">
</div>

<div id="contenido"></div>

</div>

<script>

let grado="";

/* ===== DATOS ===== */
const datos={
10:{
estudiantes:[
{name:"Juan Pérez",mat:4.5,esp:4.2,ing:4.6},
{name:"Laura Gómez",mat:4.8,esp:4.6,ing:4.9},
{name:"Carlos Ramírez",mat:4.0,esp:3.9,ing:4.2},
{name:"María Torres",mat:4.7,esp:4.5,ing:4.8},
{name:"Sofía Díaz",mat:4.9,esp:4.8,ing:5.0}
],
tareas:[
"Álgebra página 45",
"Ensayo de español",
"Taller de inglés"
],
eventos:[
"Examen matemáticas - 22 abril",
"Reunión - 25 abril"
]
},

11:{
estudiantes:[
{name:"Sebastián Gil",mat:4.8,esp:4.7,ing:4.9},
{name:"Daniela Pardo",mat:4.6,esp:4.5,ing:4.7},
{name:"Kevin Vargas",mat:3.9,esp:4.0,ing:3.8},
{name:"Sara Méndez",mat:4.7,esp:4.8,ing:4.6},
{name:"Valeria Peña",mat:4.9,esp:4.8,ing:5.0}
],
tareas:[
"Proyecto final",
"Simulacro ICFES",
"Informe ciencias"
],
eventos:[
"Entrega boletines - 20 abril",
"Graduación ensayo"
]
}
};

function cambiarGrado(){
    grado=document.getElementById("grado").value;
    document.getElementById("info").innerText=grado?"Grado "+grado:"Selecciona un grado";
    render("inicio");
}

function nav(btn,sec){
    document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render(sec);
}

function notaColor(n){
    if(n>=4.5)return "alto";
    if(n>=4.0)return "medio";
    return "bajo";
}

function render(sec){

let cont=document.getElementById("contenido");

if(!grado){
cont.innerHTML="<p>Selecciona un grado para ver la información.</p>";
return;
}

let data=datos[grado];

if(sec==="inicio"){
cont.innerHTML=`
<div class="dashboard">
<div class="card"><h2>${data.estudiantes.length}</h2><p>Estudiantes</p></div>
<div class="card"><h2>${data.tareas.length}</h2><p>Tareas</p></div>
<div class="card"><h2>${data.eventos.length}</h2><p>Eventos</p></div>
</div>`;
}

if(sec==="boletines"){
let html=`<div class="content"><h3>Boletines</h3><table>
<tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th></tr>`;

data.estudiantes.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td class="${notaColor(e.mat)}">${e.mat}</td>
<td class="${notaColor(e.esp)}">${e.esp}</td>
<td class="${notaColor(e.ing)}">${e.ing}</td>
</tr>`;
});

html+=`</table></div>`;
cont.innerHTML=html;
}

if(sec==="tareas"){
let html=`<div class="content"><h3>Tareas</h3>`;
data.tareas.forEach(t=>{
html+=`<div class="list-item">📘 ${t}</div>`;
});
html+=`</div>`;
cont.innerHTML=html;
}

if(sec==="eventos"){
let html=`<div class="content"><h3>Eventos</h3>`;
data.eventos.forEach(e=>{
html+=`<div class="list-item">📅 ${e}</div>`;
});
html+=`</div>`;
cont.innerHTML=html;
}

}

function buscar(txt){
if(!grado)return;

txt=txt.toLowerCase();
let lista=datos[grado].estudiantes.filter(e=>e.name.toLowerCase().includes(txt));

let cont=document.getElementById("contenido");

let html=`<div class="content"><h3>Resultados</h3><table>
<tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th></tr>`;

lista.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td>${e.mat}</td>
<td>${e.esp}</td>
<td>${e.ing}</td>
</tr>`;
});

html+=`</table></div>`;
cont.innerHTML=html;
}

function salir(){
window.location.href="index.html";
}

</script>

</body>
</html>
