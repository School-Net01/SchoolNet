<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolNet | Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0a0f1c;
    color:#e6edf3;
    display:flex;
}

/* ===== FONDO PREMIUM ===== */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 10% 20%, rgba(0,180,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,120,255,0.08), transparent 40%);
    z-index:0;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:260px;
    height:100vh;
    background:#0d1324;
    border-right:1px solid rgba(255,255,255,0.05);
    padding:25px;
    display:flex;
    flex-direction:column;
    z-index:2;
}

.logo{
    font-size:18px;
    font-weight:600;
    margin-bottom:30px;
}

/* SELECT */
select{
    padding:12px;
    background:#111827;
    border:none;
    border-radius:10px;
    color:white;
    margin-bottom:25px;
}

/* MENU */
.menu button{
    width:100%;
    padding:12px;
    background:none;
    border:none;
    color:#9aa4b2;
    text-align:left;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
    transition:0.2s;
}

.menu button:hover,
.menu button.active{
    background:#111827;
    color:#fff;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    padding:30px 40px;
    z-index:1;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    background:#111827;
    padding:10px 15px;
    border-radius:10px;
    border:none;
    color:white;
    width:250px;
}

/* HEADER */
.header h1{
    font-size:26px;
}

.header p{
    color:#8b98a5;
    font-size:14px;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin:30px 0;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.04);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:#38bdf8;
}

/* CONTENT */
.content{
    background:#111827;
    padding:25px;
    border-radius:14px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    padding:12px;
    font-size:14px;
}

th{
    color:#9aa4b2;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover{
    background:rgba(255,255,255,0.03);
}

/* COLORES NOTAS */
.alto{color:#22c55e}
.medio{color:#facc15}
.bajo{color:#ef4444}

/* CALENDARIO */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
    margin-top:15px;
}

.day{
    background:#020617;
    padding:10px;
    text-align:center;
    border-radius:8px;
}

.event{
    background:#38bdf8;
    color:#000;
}

/* BOTON */
.logout{
    margin-top:auto;
    padding:12px;
    border:none;
    background:#111827;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">SchoolNet</div>

    <select id="grado" onchange="cambiarGrado()">
        <option value="">Seleccionar grado</option>
        <option value="10">Grado 10</option>
        <option value="11">Grado 11</option>
    </select>

    <div class="menu">
        <button class="active" onclick="nav(this,'inicio')">Inicio</button>
        <button onclick="nav(this,'boletines')">Boletines</button>
        <button onclick="nav(this,'eventos')">Eventos</button>
        <button onclick="nav(this,'tareas')">Tareas</button>
        <button onclick="nav(this,'calendario')">Calendario</button>
    </div>

    <button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
    <div class="header">
        <h1>Colegio Técnico Francisco De Paula Santander</h1>
        <p id="info">Selecciona un grado</p>
    </div>

    <input type="text" placeholder="Buscar estudiante..." class="search" onkeyup="buscar(this.value)">
</div>

<div id="contenido"></div>

</div>

<script>

let grado="";
let estudiantes=[
{name:"Juan Pérez",mat:4.5,esp:4.2,ing:4.6},
{name:"Laura Gómez",mat:4.8,esp:4.6,ing:4.9},
{name:"Carlos Ramírez",mat:4.0,esp:3.9,ing:4.2},
{name:"María Torres",mat:4.7,esp:4.5,ing:4.8}
];

function cambiarGrado(){
    grado=document.getElementById("grado").value;
    document.getElementById("info").innerText=grado?"Grado "+grado:"Selecciona grado";
    render("inicio");
}

function nav(btn,sec){
    document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render(sec);
}

function notaColor(n){
    if(n>=4.5)return "alto";
    if(n>=4.0)return "medio";
    return "bajo";
}

function render(sec){

let cont=document.getElementById("contenido");

if(!grado){
    cont.innerHTML="<p>Selecciona un grado primero.</p>";
    return;
}

if(sec==="inicio"){
cont.innerHTML=`
<div class="dashboard">
<div class="card"><h2>6</h2><p>Tareas pendientes</p></div>
<div class="card"><h2>3</h2><p>Eventos próximos</p></div>
<div class="card"><h2>92%</h2><p>Asistencia</p></div>
</div>`;
}

if(sec==="boletines"){
let html=`<div class="content"><h3>Boletines del curso</h3><table>
<tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th></tr>`;

estudiantes.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td class="${notaColor(e.mat)}">${e.mat}</td>
<td class="${notaColor(e.esp)}">${e.esp}</td>
<td class="${notaColor(e.ing)}">${e.ing}</td>
</tr>`;
});

html+=`</table></div>`;
cont.innerHTML=html;
}

if(sec==="eventos"){
cont.innerHTML=`<div class="content"><h3>Eventos</h3><p>Entrega de boletines - 25 abril</p></div>`;
}

if(sec==="tareas"){
cont.innerHTML=`<div class="content"><h3>Tareas</h3><p>Resolver ejercicios de álgebra</p></div>`;
}

if(sec==="calendario"){
cont.innerHTML=`<div class="content">
<h3>Calendario</h3>
<div class="calendar">
<div class="day">1</div><div class="day event">2</div><div class="day">3</div>
<div class="day">4</div><div class="day">5</div><div class="day event">6</div>
</div></div>`;
}

}

function buscar(txt){
txt=txt.toLowerCase();
let filtrados=estudiantes.filter(e=>e.name.toLowerCase().includes(txt));
let cont=document.getElementById("contenido");

let html=`<div class="content"><h3>Resultados</h3><table>
<tr><th>Nombre</th><th>Mat</th><th>Esp</th><th>Ing</th></tr>`;

filtrados.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td>${e.mat}</td>
<td>${e.esp}</td>
<td>${e.ing}</td>
</tr>`;
});

html+=`</table></div>`;
cont.innerHTML=html;
}

function salir(){
window.location.href="index.html";
}

</script>

</body>
</html>
