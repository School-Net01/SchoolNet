<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegio Técnico Francisco De Paula Santander</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY ===== */
body {
    font-family: 'Inter', sans-serif;
    display: flex;
    background: #0b1120;
    color: #e5e7eb;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 270px;
    height: 100vh;
    background: #020617;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1e293b;
}

.logo {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 40px;
}

/* ===== SELECT ===== */
select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
    margin-bottom: 30px;
}

/* ===== MENU ===== */
.menu button {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    background: transparent;
    border: none;
    color: #94a3b8;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.menu button:hover,
.menu button.active {
    background: #1e293b;
    color: white;
}

/* ===== MAIN ===== */
.main {
    flex: 1;
    padding: 40px;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 22px;
    font-weight: 500;
}

.header span {
    font-size: 14px;
    color: #94a3b8;
}

/* ===== DASHBOARD ===== */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
}

.stat h2 {
    font-size: 22px;
}

.stat p {
    font-size: 13px;
    color: #94a3b8;
}

/* ===== CONTENT ===== */
.content {
    background: #111827;
    padding: 25px;
    border-radius: 15px;
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
}

th {
    background: #1e293b;
}

tr:nth-child(even) {
    background: #020617;
}

/* ===== BUTTON ===== */
.logout {
    margin-top: auto;
    padding: 12px;
    border: none;
    background: #1e293b;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 800px) {
    .sidebar {
        display: none;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">SchoolNet</div>

    <select id="grado" onchange="cambiarGrado()">
        <option value="">Selecciona grado</option>
        <option value="10">Grado 10</option>
        <option value="11">Grado 11</option>
    </select>

    <div class="menu">
        <button onclick="mostrar('inicio')" class="active">Inicio</button>
        <button onclick="mostrar('eventos')">Eventos</button>
        <button onclick="mostrar('tareas')">Tareas</button>
        <button onclick="mostrar('horarios')">Horarios</button>
        <button onclick="mostrar('boletines')">Boletines</button>
    </div>

    <button class="logout" onclick="salir()">Cerrar sesión</button>
</div>

<div class="main">

    <div class="header">
        <div>
            <h1>Colegio Técnico Francisco De Paula Santander</h1>
            <span id="infoGrado">Selecciona un grado</span>
        </div>
    </div>

    <div id="contenido"></div>

</div>

<script>

let grado = "";

// CAMBIAR GRADO
function cambiarGrado() {
    grado = document.getElementById("grado").value;
    document.getElementById("infoGrado").innerText = grado ? "Grado " + grado : "Selecciona un grado";
    mostrar("inicio");
}

// CAMBIAR MENÚ ACTIVO
function activar(btn) {
    document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

// MOSTRAR CONTENIDO
function mostrar(seccion) {

    let cont = document.getElementById("contenido");

    if (!grado) {
        cont.innerHTML = "<p>Selecciona un grado para continuar.</p>";
        return;
    }

    if (seccion === "inicio") {
        cont.innerHTML = `
        <div class="dashboard">
            <div class="stat"><h2>5</h2><p>Tareas pendientes</p></div>
            <div class="stat"><h2>2</h2><p>Eventos próximos</p></div>
            <div class="stat"><h2>4</h2><p>Materias activas</p></div>
        </div>
        `;
    }

    if (seccion === "eventos") {
        cont.innerHTML = `
        <div class="content">
            <h3>Eventos</h3>
            <p>Reunión académica - 22 abril</p>
            <p>Actividad cultural - 25 abril</p>
        </div>
        `;
    }

    if (seccion === "tareas") {
        cont.innerHTML = `
        <div class="content">
            <h3>Tareas</h3>
            <p>Matemáticas: funciones</p>
            <p>Español: ensayo</p>
        </div>
        `;
    }

    if (seccion === "horarios") {
        cont.innerHTML = `
        <div class="content">
            <h3>Horarios</h3>
            <p>Lunes: Matemáticas - Inglés</p>
            <p>Martes: Química - Sociales</p>
        </div>
        `;
    }

    if (seccion === "boletines") {
        cont.innerHTML = `
        <div class="content">
            <h3>Boletines</h3>
            <table>
                <tr><th>Materia</th><th>Nota</th></tr>
                <tr><td>Matemáticas</td><td>4.5</td></tr>
                <tr><td>Español</td><td>4.2</td></tr>
            </table>
        </div>
        `;
    }
}

// SALIR
function salir() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
